name: Release

on:
  push:
    tags: ['v*']            # e.g. git tag v0.1.0 && git push --tags
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 0.1.0 (defaults to the tag)'
        required: false

# The Sentry DSN / auth token live ONLY in repo/org Actions secrets and are injected at build time —
# never committed. Configure at Settings → Secrets and variables → Actions:
#   SENTRY_DSN         (required to enable crash reporting in released builds)
#   SENTRY_AUTH_TOKEN  (optional; enables debug-symbol upload for readable stack traces)
jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./installer/windows/build.ps1 -Version ${{ needs.version.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/out/*.exe

  linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install FPM
        run: sudo gem install --no-document fpm
      - name: Build package (.deb)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x installer/linux/build-deb.sh
          ./installer/linux/build-deb.sh ${{ needs.version.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: installer/linux/out/*.deb

  release:
    needs: [version, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
