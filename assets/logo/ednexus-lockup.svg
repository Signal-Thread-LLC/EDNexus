<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" role="img">
  <title>EDNexus logo lockup</title>
  <desc>The EDNexus hexagon mark beside the EDNexus wordmark and tagline, on a dark panel.</desc>
  <rect width="880" height="280" rx="40" fill="#0E1013" stroke="#242830" stroke-width="2"/>

  <g stroke="#F07100" stroke-width="5" stroke-linecap="round" opacity="0.5">
    <line x1="150" y1="140" x2="150" y2="68"/>
    <line x1="150" y1="140" x2="212.35" y2="104"/>
    <line x1="150" y1="140" x2="212.35" y2="176"/>
    <line x1="150" y1="140" x2="150" y2="212"/>
    <line x1="150" y1="140" x2="87.65" y2="176"/>
    <line x1="150" y1="140" x2="87.65" y2="104"/>
  </g>
  <polygon points="150,68 212.35,104 212.35,176 150,212 87.65,176 87.65,104"
           fill="none" stroke="#F07100" stroke-width="7" stroke-linejoin="round"/>
  <g fill="#F07100">
    <circle cx="150" cy="68" r="5.5"/>
    <circle cx="212.35" cy="104" r="5.5"/>
    <circle cx="212.35" cy="176" r="5.5"/>
    <circle cx="150" cy="212" r="5.5"/>
    <circle cx="87.65" cy="176" r="5.5"/>
    <circle cx="87.65" cy="104" r="5.5"/>
  </g>
  <circle cx="150" cy="140" r="16" fill="#0E1013" stroke="#F07100" stroke-width="5"/>
  <circle cx="150" cy="140" r="6" fill="#FF8C2E"/>

  <text x="280" y="150" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="600" font-size="62">
    <tspan fill="#F07100">ED</tspan><tspan fill="#E7E9EE">Nexus</tspan>
  </text>
  <text x="282" y="192" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="400" font-size="19" fill="#8A909C">Commander console for Elite Dangerous</text>
</svg>
